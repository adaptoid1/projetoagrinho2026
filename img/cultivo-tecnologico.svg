<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" preserveAspectRatio="xMidYMid meet">
<title>Ilustração do cultivo tecnológico — passe o mouse para animar</title>
<defs>
  <clipPath id="techClip"><rect width="400" height="300"/></clipPath>
</defs>

<!-- bg -->
<rect width="400" height="300" fill="#040a06"/>

<!-- grid lines (static base) -->
<g stroke="#39ff8a" stroke-width=".5" opacity=".10">
  <line x1="0" y1="50" x2="400" y2="50"/>
  <line x1="0" y1="100" x2="400" y2="100"/>
  <line x1="0" y1="150" x2="400" y2="150"/>
  <line x1="0" y1="168" x2="400" y2="168"/>
  <line x1="50"  y1="0" x2="50"  y2="170"/>
  <line x1="130" y1="0" x2="130" y2="170"/>
  <line x1="200" y1="0" x2="200" y2="170"/>
  <line x1="270" y1="0" x2="270" y2="170"/>
  <line x1="350" y1="0" x2="350" y2="170"/>
</g>

<!-- grid pulse (animated) -->
<g stroke="#39ff8a" stroke-width=".8">
  <line x1="0" y1="50" x2="400" y2="50" opacity="0">
    <animate id="aGrid1" attributeName="opacity" values="0;.28;0" dur="2.8s" repeatCount="indefinite" begin="indefinite"/>
  </line>
  <line x1="0" y1="100" x2="400" y2="100" opacity="0">
    <animate id="aGrid2" attributeName="opacity" values="0;.28;0" dur="2.8s" repeatCount="indefinite" begin="0.6s;indefinite"/>
  </line>
  <line x1="0" y1="150" x2="400" y2="150" opacity="0">
    <animate id="aGrid3" attributeName="opacity" values="0;.28;0" dur="2.8s" repeatCount="indefinite" begin="1.2s;indefinite"/>
  </line>
  <line x1="200" y1="0" x2="200" y2="170" opacity="0">
    <animate id="aGrid4" attributeName="opacity" values="0;.24;0" dur="3.2s" repeatCount="indefinite" begin="indefinite"/>
  </line>
</g>

<!-- scan line -->
<rect x="0" y="0" width="400" height="2" fill="#39ff8a" opacity="0">
  <animate id="aScan" attributeName="opacity" values="0;.35;0" dur="3.5s" repeatCount="indefinite" begin="indefinite"/>
  <animateTransform id="aScanMove" attributeName="transform" type="translate"
    values="0,0;0,168" dur="3.5s" repeatCount="indefinite" begin="indefinite"/>
</rect>

<!-- ground -->
<rect x="0" y="168" width="400" height="132" fill="#081410"/>
<rect x="0" y="168" width="400" height="2" fill="#39ff8a" opacity=".45"/>

<!-- furrow lines -->
<g stroke="#1a3822" stroke-width="1.2" opacity=".6">
  <line x1="25"  y1="300" x2="65"  y2="170"/>
  <line x1="115" y1="300" x2="138" y2="170"/>
  <line x1="200" y1="300" x2="200" y2="170"/>
  <line x1="285" y1="300" x2="262" y2="170"/>
  <line x1="375" y1="300" x2="335" y2="170"/>
</g>

<!-- sensor zone boxes -->
<g fill="none" stroke="#39ff8a" stroke-width=".6" opacity=".3">
  <rect x="38"  y="186" width="64" height="36" rx="2"/>
  <rect x="168" y="188" width="64" height="36" rx="2"/>
  <rect x="298" y="186" width="64" height="36" rx="2"/>
</g>

<!-- sensor dots (static base) -->
<circle cx="70"  cy="208" r="4" fill="#39ff8a" opacity=".4"/>
<circle cx="200" cy="210" r="4" fill="#39ff8a" opacity=".4"/>
<circle cx="330" cy="208" r="4" fill="#39ff8a" opacity=".4"/>

<!-- sensor blink animated -->
<circle cx="70" cy="208" r="4" fill="#39ff8a" opacity="0">
  <animate id="aSensor1r" attributeName="r"       values="4;7;4"       dur="2.1s" repeatCount="indefinite" begin="indefinite"/>
  <animate id="aSensor1o" attributeName="opacity" values="0.5;1;0.5"   dur="2.1s" repeatCount="indefinite" begin="indefinite"/>
</circle>
<circle cx="200" cy="210" r="4" fill="#39ff8a" opacity="0">
  <animate id="aSensor2r" attributeName="r"       values="4;7;4"       dur="2.1s" repeatCount="indefinite" begin="0.7s;indefinite"/>
  <animate id="aSensor2o" attributeName="opacity" values="0.5;1;0.5"   dur="2.1s" repeatCount="indefinite" begin="0.7s;indefinite"/>
</circle>
<circle cx="330" cy="208" r="4" fill="#39ff8a" opacity="0">
  <animate id="aSensor3r" attributeName="r"       values="4;7;4"       dur="2.1s" repeatCount="indefinite" begin="1.4s;indefinite"/>
  <animate id="aSensor3o" attributeName="opacity" values="0.5;1;0.5"   dur="2.1s" repeatCount="indefinite" begin="1.4s;indefinite"/>
</circle>

<!-- ping rings -->
<circle cx="70"  cy="208" r="4" fill="none" stroke="#39ff8a" stroke-width="1.2" opacity="0">
  <animate id="aPing1r" attributeName="r"       values="4;24;24"    dur="2.8s" repeatCount="indefinite" begin="indefinite"/>
  <animate id="aPing1o" attributeName="opacity" values=".9;0;0"     dur="2.8s" repeatCount="indefinite" begin="indefinite"/>
</circle>
<circle cx="200" cy="210" r="4" fill="none" stroke="#39ff8a" stroke-width="1.2" opacity="0">
  <animate id="aPing2r" attributeName="r"       values="4;24;24"    dur="2.8s" repeatCount="indefinite" begin="0.9s;indefinite"/>
  <animate id="aPing2o" attributeName="opacity" values=".9;0;0"     dur="2.8s" repeatCount="indefinite" begin="0.9s;indefinite"/>
</circle>
<circle cx="330" cy="208" r="4" fill="none" stroke="#39ff8a" stroke-width="1.2" opacity="0">
  <animate id="aPing3r" attributeName="r"       values="4;24;24"    dur="2.8s" repeatCount="indefinite" begin="1.8s;indefinite"/>
  <animate id="aPing3o" attributeName="opacity" values=".9;0;0"     dur="2.8s" repeatCount="indefinite" begin="1.8s;indefinite"/>
</circle>

<!-- DRONE — fully centered at x=200, y=85 -->
<g id="droneOuter">
  <!-- horizontal drift -->
  <animateTransform id="aDroneH" attributeName="transform" type="translate"
    values="0,0;12,0;0,0;-8,0;0,0" dur="9s" repeatCount="indefinite" begin="indefinite"/>

  <g id="droneInner">
    <!-- vertical float -->
    <animateTransform id="aDroneV" attributeName="transform" type="translate"
      values="0,0;0,-10;0,0;0,-5;0,0" dur="3.4s" repeatCount="indefinite" begin="indefinite"/>

    <!-- beam cone (static, opacity animated) -->
    <path d="M196,99 L166,248 L234,248 L204,99 Z" fill="#39ff8a" opacity=".04"/>

    <!-- beam line -->
    <line x1="200" y1="99" x2="200" y2="244" stroke="#39ff8a" stroke-width="1.5"
      stroke-dasharray="5 4" opacity="0">
      <animate id="aBeam" attributeName="opacity" values="0;.55;.25;.55;0" dur="2.8s" repeatCount="indefinite" begin="indefinite"/>
    </line>

    <!-- shadow on ground -->
    <ellipse cx="200" cy="248" rx="38" ry="7" fill="#39ff8a" opacity="0">
      <animate id="aShadow" attributeName="opacity" values="0;.09;0" dur="3.4s" repeatCount="indefinite" begin="indefinite"/>
    </ellipse>

    <!-- arms -->
    <line x1="136" y1="85" x2="176" y2="85" stroke="#39ff8a" stroke-width="2"/>
    <line x1="224" y1="85" x2="264" y2="85" stroke="#39ff8a" stroke-width="2"/>

    <!-- motor housings -->
    <circle cx="132" cy="85" r="9" fill="#081410" stroke="#39ff8a" stroke-width="1.2"/>
    <circle cx="268" cy="85" r="9" fill="#081410" stroke="#39ff8a" stroke-width="1.2"/>

    <!-- left rotors -->
    <line x1="114" y1="85" x2="150" y2="85" stroke="#39ff8a" stroke-width="2.5" stroke-linecap="round">
      <animateTransform id="aRotorL1" attributeName="transform" type="rotate"
        values="0 132 85;360 132 85" dur="0.3s" repeatCount="indefinite" begin="indefinite"/>
    </line>
    <line x1="132" y1="67" x2="132" y2="103" stroke="#39ff8a" stroke-width="2.5" stroke-linecap="round">
      <animateTransform id="aRotorL2" attributeName="transform" type="rotate"
        values="0 132 85;360 132 85" dur="0.3s" repeatCount="indefinite" begin="indefinite"/>
    </line>

    <!-- right rotors (reverse) -->
    <line x1="250" y1="85" x2="286" y2="85" stroke="#39ff8a" stroke-width="2.5" stroke-linecap="round">
      <animateTransform id="aRotorR1" attributeName="transform" type="rotate"
        values="360 268 85;0 268 85" dur="0.3s" repeatCount="indefinite" begin="indefinite"/>
    </line>
    <line x1="268" y1="67" x2="268" y2="103" stroke="#39ff8a" stroke-width="2.5" stroke-linecap="round">
      <animateTransform id="aRotorR2" attributeName="transform" type="rotate"
        values="360 268 85;0 268 85" dur="0.3s" repeatCount="indefinite" begin="indefinite"/>
    </line>

    <!-- drone body -->
    <rect x="176" y="75" width="48" height="26" rx="5" fill="#081410" stroke="#39ff8a" stroke-width="1.2"/>

    <!-- camera -->
    <circle cx="200" cy="101" r="5" fill="none" stroke="#39ff8a" stroke-width="1" opacity=".7"/>
    <circle cx="200" cy="101" r="2" fill="#39ff8a" opacity=".5"/>

    <!-- LEDs -->
    <circle cx="190" cy="82" r="2" fill="#39ff8a">
      <animate id="aLed1" attributeName="opacity" values="1;0.15;1" dur="1.2s" repeatCount="indefinite" begin="indefinite"/>
    </circle>
    <circle cx="210" cy="82" r="2" fill="#39ff8a">
      <animate id="aLed2" attributeName="opacity" values="0.15;1;0.15" dur="1.2s" repeatCount="indefinite" begin="indefinite"/>
    </circle>

    <!-- center dot -->
    <circle cx="200" cy="85" r="3" fill="#39ff8a"/>
  </g>
</g>

<!-- binary digits scattered (static base, low opacity) -->
<g font-family="monospace" font-size="11" fill="#39ff8a" clip-path="url(#techClip)">
  <text x="22"  y="42"  opacity=".06">0</text>
  <text x="65"  y="72"  opacity=".06">1</text>
  <text x="108" y="38"  opacity=".06">0</text>
  <text x="300" y="52"  opacity=".06">1</text>
  <text x="348" y="88"  opacity=".06">0</text>
  <text x="372" y="42"  opacity=".06">1</text>
  <text x="22"  y="138" opacity=".06">1</text>
  <text x="372" y="152" opacity=".06">0</text>
</g>

<!-- binary digits animated blink -->
<g font-family="monospace" font-size="11" fill="#39ff8a" clip-path="url(#techClip)">
  <text x="22"  y="42"  opacity="0">
    <animate id="aBit1" attributeName="opacity" values="0;.7;0" dur="2.4s" repeatCount="indefinite" begin="0s;indefinite"/>0
  </text>
  <text x="65"  y="72"  opacity="0">
    <animate id="aBit2" attributeName="opacity" values="0;.7;0" dur="2.4s" repeatCount="indefinite" begin="0.6s;indefinite"/>1
  </text>
  <text x="108" y="38"  opacity="0">
    <animate id="aBit3" attributeName="opacity" values="0;.7;0" dur="2.4s" repeatCount="indefinite" begin="1.2s;indefinite"/>0
  </text>
  <text x="300" y="52"  opacity="0">
    <animate id="aBit4" attributeName="opacity" values="0;.7;0" dur="2.4s" repeatCount="indefinite" begin="0.3s;indefinite"/>1
  </text>
  <text x="348" y="88"  opacity="0">
    <animate id="aBit5" attributeName="opacity" values="0;.7;0" dur="2.4s" repeatCount="indefinite" begin="0.9s;indefinite"/>0
  </text>
  <text x="372" y="42"  opacity="0">
    <animate id="aBit6" attributeName="opacity" values="0;.7;0" dur="2.4s" repeatCount="indefinite" begin="1.8s;indefinite"/>1
  </text>
  <text x="22"  y="138" opacity="0">
    <animate id="aBit7" attributeName="opacity" values="0;.6;0" dur="2.4s" repeatCount="indefinite" begin="1.5s;indefinite"/>1
  </text>
  <text x="372" y="152" opacity="0">
    <animate id="aBit8" attributeName="opacity" values="0;.6;0" dur="2.4s" repeatCount="indefinite" begin="0.4s;indefinite"/>0
  </text>
</g>

<!-- hover hint -->
<text id="techHint" x="200" y="290" text-anchor="middle" font-family="monospace" font-size="10"
  fill="#39ff8a" opacity=".4" letter-spacing="2">PASSE O MOUSE PARA ANIMAR</text>
</svg>
